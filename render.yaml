services:
  - type: web
    name: content-broadcast-frontend
    runtime: node
    repo: https://github.com/AKD27/content-broadcast-system.git
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: web
    name: content-broadcast-backend
    runtime: node
    repo: https://github.com/AKD27/content-broadcast-system.git
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
